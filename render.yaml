services:
  - type: web
    name: career-align-backend
    runtime: image
    repo: https://github.com/Srijita-31/career-align
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: "4001"
      - key: DATABASE_URL
        fromDatabase:
          name: career-align-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: career-align-frontend
          type: web
          property: url
      - key: EMBEDDING_PROVIDER
        value: local
      - key: LOCAL_EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSIONS
        value: "384"
      - key: JOB_SOURCES
        value: LinkedIn,Internshala,Indeed,Glassdoor,WeWorkRemotely
      - key: JOB_TERM_LIMIT
        value: "6"
      - key: SCRAPE_CRON
        value: 0 */6 * * *
      - key: SCRAPE_TIMEZONE
        value: Asia/Kolkata
      - key: MAIL_DRIVER
        value: console
      - key: MAIL_FROM
        value: no-reply@career-align.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: career-align-frontend
    runtime: image
    repo: https://github.com/Srijita-31/career-align
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: career-align-backend
          type: web
          property: url

databases:
  - name: career-align-db
    databaseName: career_align
    user: career_align
    plan: free
    ipAllowList: []
