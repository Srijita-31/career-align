<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Align</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>Career Align</h1>
        <p>Upload your resume and profile to compare against scraped jobs with embedding similarity.</p>
      </header>

      <main>
        <section class="form-panel">
          <form id="matchForm">
            <div class="field-group">
              <label for="name">Name</label>
              <input id="name" name="name" placeholder="Jane Doe" required />
            </div>
            <div class="field-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="jane@example.com" required />
            </div>
            <div class="field-group">
              <label for="experienceLevel">Experience</label>
              <select id="experienceLevel" name="experienceLevel">
                <option>Student</option>
                <option>Intern</option>
                <option>Fresher</option>
                <option>Entry Level</option>
                <option>Mid Level</option>
                <option>Senior</option>
              </select>
            </div>
            <div class="field-group">
              <label for="workPreference">Work mode</label>
              <select id="workPreference" name="workPreference">
                <option value="onsite">Onsite</option>
                <option value="hybrid">Hybrid</option>
                <option value="remote" selected>Remote</option>
              </select>
            </div>
            <div class="field-group">
              <label for="locationScope">Location</label>
              <select id="locationScope" name="locationScope">
                <option value="india" selected>Within India</option>
                <option value="outside-india">Outside India</option>
              </select>
            </div>
            <div class="field-group">
              <label for="skills">Skills (comma separated)</label>
              <textarea id="skills" name="skills" rows="3" placeholder="JavaScript, Python, React"></textarea>
            </div>
            <div class="field-group">
              <label for="resume">Resume file</label>
              <input id="resume" name="resume" type="file" accept=".pdf,.docx,.txt" />
            </div>
            <div class="form-actions">
              <button type="submit">Compare Jobs</button>
            </div>
          </form>
        </section>

        <section class="results-panel">
          <div id="resultsHeading" class="results-heading">
            <h2>Similarity Matches</h2>
            <p id="resultsDescription">Submit your profile to rank scraped jobs by semantic similarity.</p>
          </div>
          <div id="results"></div>
        </section>
      </main>
    </div>

    <script src="app.js?v=4"></script>
  </body>
</html>
