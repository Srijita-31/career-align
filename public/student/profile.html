<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal – Profile</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/js/student.js" defer></script>
</head>
<body class="bg-gradient">
  <div class="glass-card centered">
    <h1 class="title">Student Profile</h1>
    <form id="profileForm" class="form">
      <div class="field-group"><label>Resume Path (optional)</label><input type="text" name="resumePath" class="input"/></div>
      <div class="field-group"><label>Skills (comma separated)</label><input type="text" name="skills" class="input"/></div>
      <div class="field-group"><label>Preferred Location</label><input type="text" name="location" class="input"/></div>
      <div class="field-group"><label>Preferred Roles (comma separated)</label><input type="text" name="preferredRoles" class="input"/></div>
      <button type="submit" class="btn-primary">Save Profile</button>
    </form>
    <div id="profileMessage" class="msg"></div>
  </div>
</body>
</html>
