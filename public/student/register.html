<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Sign Up - Career Align</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
  <script src="/js/student.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex">

  <!-- Left Side: Branding -->
  <div class="hidden lg:flex lg:w-1/2 bg-blue-600 flex-col justify-center px-12 xl:px-24">
    <div class="max-w-md">
      <h1 class="text-white text-5xl font-bold tracking-tight mb-6">Career Align</h1>
      <p class="text-blue-100 text-xl font-medium leading-relaxed">
        Join today to find internships and jobs matched exactly to your skills.
      </p>
    </div>
  </div>

  <!-- Right Side: Registration Card -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-gray-50 overflow-y-auto">
    <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-200 p-8 sm:p-10 my-auto">
      
      <!-- Mobile Logo -->
      <div class="lg:hidden mb-8 text-center">
        <h1 class="text-3xl font-bold text-blue-600 tracking-tight">Career Align</h1>
      </div>

      <div class="mb-8">
        <h2 class="text-2xl font-semibold text-gray-900 mb-2">Create an account</h2>
        <p class="text-gray-500 text-sm">Start your career journey with us.</p>
      </div>

      <form id="registerForm" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 text-sm transition-shadow outline-none placeholder-gray-400"
            placeholder="student@example.com"
          >
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 text-sm transition-shadow outline-none placeholder-gray-400"
            placeholder="Create a strong password"
          >
        </div>

        <div>
          <button 
            type="submit" 
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
          >
            Sign up
          </button>
        </div>
      </form>

      <div id="registerMessage" class="hidden mt-4 p-3 rounded-md text-sm text-center"></div>

      <div class="mt-8 text-center text-sm text-gray-600">
        Already have an account? 
        <a href="/student/login.html" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
          Log in
        </a>
      </div>

    </div>
  </div>

</body>
</html>
