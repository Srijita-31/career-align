<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Portal – Login</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/js/company.js" defer></script>
</head>
<body class="bg-gradient">
  <div class="glass-card centered">
    <h1 class="title">Recruiter Login</h1>
    <form id="loginForm" class="form">
      <input type="email" name="email" placeholder="Email" required class="input" />
      <input type="password" name="password" placeholder="Password" required class="input" />
      <button type="submit" class="btn-primary">Login</button>
    </form>
    <div id="loginMessage" class="msg"></div>
  </div>
</body>
</html>
