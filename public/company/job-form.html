<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Portal – Create Job</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/js/company.js" defer></script>
</head>
<body class="bg-gradient">
  <div class="glass-card centered">
    <h1 class="title">Create New Job</h1>
    <form id="jobForm" class="form">
      <div class="field-group"><label>Title</label><input type="text" name="title" required class="input"/></div>
      <div class="field-group"><label>Company</label><input type="text" name="company" required class="input"/></div>
      <div class="field-group"><label>Location</label><input type="text" name="location" class="input"/></div>
      <div class="field-group"><label>Salary</label><input type="text" name="salary" class="input"/></div>
      <div class="field-group"><label>Job Type</label><input type="text" name="job_type" class="input"/></div>
      <div class="field-group"><label>Work Mode</label><input type="text" name="work_mode" class="input"/></div>
      <div class="field-group"><label>Apply URL</label><input type="url" name="apply_url" required class="input"/></div>
      <div class="field-group"><label>Description</label><textarea name="description" rows="4" class="input"></textarea></div>
      <div class="field-group"><label>Skills (comma separated)</label><input type="text" name="skills" class="input"/></div>
      <button type="submit" class="btn-primary">Publish Job</button>
    </form>
    <div id="jobMessage" class="msg"></div>
  </div>
</body>
</html>
